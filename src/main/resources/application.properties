# =============================================================================
# DnXT Global Admin Portal — Application Configuration
# =============================================================================

server.port=8110
server.servlet.context-path=/

# --- Database (H2 for local dev, PostgreSQL in production via env vars) ---
spring.datasource.url=${ADMIN_DB_URL:jdbc:h2:mem:globaladmindb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${ADMIN_DB_USERNAME:sa}
spring.datasource.password=${ADMIN_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=${ADMIN_DB_DIALECT:org.hibernate.dialect.H2Dialect}

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- JWT (8-hour expiry for admin portal — shorter than Operations 24h) ---
admin.jwt.secret=${ADMIN_JWT_SECRET:dnxt-global-admin-default-secret-key-must-change-in-production-at-least-32-bytes}
admin.jwt.expiration-ms=${ADMIN_JWT_EXPIRATION:28800000}

# --- Google Workspace SSO ---
admin.google.client-id=${GOOGLE_CLIENT_ID:}
admin.google.client-secret=${GOOGLE_CLIENT_SECRET:}
admin.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8110/api/auth/google/callback}

# --- Security: Email Domain Restriction ---
admin.security.allowed-email-domains=${ALLOWED_EMAIL_DOMAINS:dnxtsolutions.com}

# --- Security: Account Lockout ---
admin.security.max-failed-attempts=5
admin.security.lockout-duration-minutes=30

# --- Security: Rate Limiting (login endpoint) ---
admin.security.login-rate-limit-per-ip=10
admin.security.login-rate-limit-window-minutes=15

# --- External Service URLs ---
admin.operations-service.url=${OPERATIONS_SERVICE_URL:http://localhost:8102}
admin.operations-service.username=${OPERATIONS_SERVICE_USERNAME:admin}
admin.operations-service.password=${OPERATIONS_SERVICE_PASSWORD:admin123}
admin.operations-service.internal-url=${OPERATIONS_INTERNAL_URL:http://localhost:8102}
admin.operations-service.internal-api-key=${OPS_INTERNAL_API_KEY:}
admin.base-domain=${BASE_DOMAIN:dnxtcloud.com}
admin.mail-service.url=${MAIL_SERVICE_URL:http://localhost:8089}

# --- Service-to-Service API Key ---
admin.api-key=${ADMIN_API_KEY:}

# --- CORS ---
admin.cors.allowed-origins=${ADMIN_CORS_ORIGINS:http://localhost:5174,http://localhost:8110}

# --- Session & Proxy (Azure Container Apps) ---
server.servlet.session.timeout=15m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
